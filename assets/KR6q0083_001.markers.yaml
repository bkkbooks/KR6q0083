  - {type: variant, offset: 7658, length: 1, content: 動, 甲: 動禪詮云當唐高宗乃至玄宗朝時圓頓本宗未行此地唯神秀禪師大揚漸教為二京法主三帝門師全稱達磨之宗又不顯即佛之旨曹溪荷澤恐圓宗滅絕遂呵毀住心調伏等事但是除病非除法也云云}
