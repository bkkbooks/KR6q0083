  - {type: variant, offset: 7984, length: 1, content: 道, 宮: 道然此門坐禪元著心亦不著淨亦不是不動若言著心心元是妄知心如幻故無所著也若言著淨人性本淨由妄念故蓋覆真如但無妄想性自清淨起心著淨却生淨妄妄無處所著者是妄淨無形相却立淨相言是工夫作此見者障自本性却被淨縛善知識迷人身雖不動開口便說他人是非長短好惡與道違背若著心著淨却障道也}
