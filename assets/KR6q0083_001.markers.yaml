  - {type: variant, offset: 22958, length: 1, content: 錄, 宮: 錄宋太祖開國之初王師平南海劉氏殘丘作梗師之塔廟鞠為煨燼而真身為守塔僧保護一無所損尋有制興修功未竟會宋太宗即位留心禪門詔新師塔七層加諡大鑑真空禪師太平興國之塔宋仁宋天聖十年安輿迎師真身及衣鉢入大內供養加諡大鑑真空普覺禪師宋神宗加諡大鑑真空普覺圓明禪師本州復興梵剎事蹟元獻公晏殊所作碑記具戴，六祖禪師自開元元年癸丑歲示寂至至元二十七年庚寅得五百七十八年矣，壇經乃迷六祖禪師本末與夫接門弟子問答之語其辭直截豁露分明示人更無隱語達磨而下最為奇特可謂直指人心見性成佛之捷徑但其間別有一句雖不出於文字言語之外却不在於言語文字之中試問諸人還讀得麼若讀得出立地化凡成聖其或未然且只循行數墨亦福不唐捐，秋谷長老捐財入梓流通撒向諸人面前直是老婆心切不知誰解體悉此意耶所南翁跋，法寶壇經乃是佛祖骨髓直截根源了無枝葉如曰麗天靡所不照如水歸海同一醎味見者飲者莫不具足，報國秋谷老師刊板印施以廣其傳欲令學般若菩薩頓悟心宗同趣覺地雖然葉落歸根來時無口若謂老盧末後句此卷向甚處得來，延祐丙辰三月日瑞光景瞻拜書咸豊十年庚申十月日普應拜書}
