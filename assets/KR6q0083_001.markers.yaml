  - {type: variant, offset: 7659, length: 4, content: 坐禪第五, 宮: 教授坐禪第四}
  - {type: line-break, offset: 7663, content: '', id: KR6q0083_T_001-0353b08, ed: T, 'n': 0353b08}
  - {type: xml-element, offset: 7663, content: '', id: pT48p0353b0801, name: p, role: open, attrs: {'xml:id': pT48p0353b0801}}
  - {type: variant, offset: 7663, length: 166, content: 師示眾云：「此門坐禪，元不著心，亦不著淨，亦不是不動。若言著心，心元是妄，知心如幻，故無所著也。若言著淨，人性本淨，由妄念故，蓋覆真如。但無妄想，性自清淨；起心著淨，却生淨妄。妄無處所，著者是妄。淨無形相，却立淨相，言是工夫。作此見者，障自本性，却被淨縛。善知識！若修不動者，但見一切人時，不見人之是非善惡過患，即是自性不動。善知識！迷人身雖不動！開口便說他人是非長短好惡，與道違背。若著心著淨，即障道也。」, 宮: ''}
