body:
  text: 六祖大師法寶壇經目錄卷首序贊各一編經行由第一般若第二疑問第三定慧第四坐禪第五懺悔第六機緣第七頓漸第八宣詔第九付囑第十附錄緣起外紀歷朝崇奉事蹟賜諡大鑒禪師碑大鑒禪師碑佛衣銘跋目錄終六祖大師法寶壇經序古筠比丘德異撰妙道虛玄不可思議忘言得旨端可悟明故世尊分座於多子塔前拈華於靈山會上似火與火以心印心西傳四七至菩提達磨東來此土直指人心見性成佛有可大師者首於言下悟入末上三拜得髓受衣紹祖開闡正宗三傳而至黃梅會中高僧七百惟負舂居士一偈傳衣為六代祖南遯十餘年一旦以非風旛動之機觸開印宗正眼居士由是祝髮登壇應跋陀羅懸記開東山法門韋使君命海禪者錄其語目之曰法寶壇經大師始於五羊終至曹溪說法三十七年霑甘露味入聖超凡者莫記其數悟佛心宗行解相應為大知識者名載傳燈惟南嶽青原執侍最久盡得無巴鼻故出馬祖石頭機智圓明玄風大震乃有臨濟溈仰曹洞雲門法眼諸公巍然而出道德超群門庭險峻啟迪英靈衲子奮志衝關一門深入五派同源歷遍罏錘規模廣大原其五家綱要盡出壇經夫壇經者言簡義豐理明事備具足諸佛無量法門一一法門具足無量妙義一一妙義發揮諸佛無量妙理即彌勒樓閣中即普賢毛孔中善入者即同善財於一念間圓滿功德與普賢等與諸佛等惜乎壇經為後人節略太多不見六祖大全之旨德異幼年嘗見古本自後遍求三十餘載近得通上人尋到全文遂刊于吳中休休禪庵與諸勝士同一受用惟願開卷舉目直入大圓覺海續佛祖慧命無窮斯余志願滿矣至元二十七年庚寅歲中春日敘六祖大師法寶壇經贊宋明教大師契嵩撰贊者告也發經而溥告也壇經者至人之所以宣其心也至人謂六祖篇內同何心邪佛所傳之妙心也大哉心乎資始變化而清淨常若凡然聖然幽然顯然無所處而不自得之聖言乎明凡言乎昧昧也者變也明也者復也變復雖殊而妙心一也始釋迦文佛以是而傳之大龜氏大龜氏相傳之三十三世者傳諸大鑒六祖諡號大鑒禪師大鑒傳之而益傳也說之者抑亦多端固有名同而實異者也固有義多而心一者也曰血肉心者曰緣慮心者曰集起心者曰堅實心者若心所之心益多也是所謂名同而實異者也曰真如心者曰生滅心者曰煩惱心者曰菩提心者諸修多羅其類此者殆不可勝數是所謂義多而心一者也義有覺義有不覺義心有真心有妄心皆所以別其正心也方壇經之所謂心者亦義之覺義心之實心也昔者聖人之將隱也乃命乎龜氏教外以傳法之要意其人滯迹而忘返固欲後世者提本而正末也故涅槃曰我有無上正法悉已付囑摩訶迦葉矣天之道存乎易地之道存乎簡聖人之道存乎要要也者至妙之謂也聖人之道以要則為法界門之樞機為無量義之所會為大乘之椎輪法華豈不曰當知是妙法諸佛之祕要華嚴豈不曰以少方便疾成菩提要乎其於聖人之道利而大矣哉是故壇經之宗尊其心要也心乎若明若冥若空若靈若寂若惺有物乎無物乎謂之一物固彌於萬物謂之萬物固統於一物一物猶萬物也萬物猶一物也此謂可思議也及其不可思也不可議也天下謂之玄解謂之神會謂之絕待謂之默體謂之冥通一皆離之遣之遣之又遣亦烏能至之微其果然獨得與夫至人之相似者孰能諒乎推而廣之則無往不可也探而裁之則無所不當也施於證性則所見至親施於修心則所詣至正施於崇德辯惑則真妄易顯施於出世則佛道速成施於救世則塵勞易歇此壇經之宗所以旁行天下而不厭彼謂即心即佛淺者何其不知量也以折錐探地而淺地以屋漏窺天而小天豈天地之然邪然百家者雖苟勝之弗如也而至人通而貫之合乎群經斷可見矣至人變而通之非預名字不可測也故其顯說之有倫有義密說之無首無尾天機利者得其深天機鈍者得其淺可擬乎可議乎不得已況之則圓頓教也最上乘也如來之清淨禪也菩薩藏之正宗也論者謂之玄學不亦詳乎天下謂之宗門不亦宜乎壇經曰定慧為本者趣道之始也定也者靜也慧也者明也明以觀之靜以安之安其心可以體心也觀其道可以語道也一行三昧者法界一相之謂也謂萬善雖殊皆正於一行者也無相為體者尊大戒也無念為宗者尊大定也無住為本者尊大慧也夫戒定慧者三乘之達道也夫妙心者戒定慧之大資也以一妙心而統乎三法故曰大也無相戒者戒其必正覺也四弘願者願度度苦也願斷斷集也願學學道也願成成寂滅也滅無所滅故無所不斷也道無所道故無所不度也無相懺者懺非所懺也三歸戒者歸其一也一也者三寶之所以出也說摩訶般若者謂其心之至中也般若也者聖人之方便也聖人之大智也固能寂之明之權之實之天下以其寂可以泯眾惡也天下以其明可以集眾善也天下以其權可以大有為也天下以其實可以大無為也至矣哉般若也聖人之道非夫般若不明也不成也天下之務非夫般若不宜也不當也至人之為以般若振不亦遠乎我法為上上根人說者宜之也輕物重用則不勝大方小授則過也從來默傳分付者密說之謂也密也者非不言而闇證也真而密之也不解此法而輒謗毀謂百劫千生斷佛種性者防天下亡其心也偉乎壇經之作也其本正其迹效其因真其果不謬前聖也後聖也如此起之如此示之如此復之浩然沛乎若大川之注也若虛空之通也若日月之明也若形影之無礙也若鴻漸之有序也妙而得之之謂本推而用之之謂迹以其非始者始之之謂因以其非成者成之之謂果果不異乎因謂之正果也因不異乎果謂之正因也迹必顧乎本謂之大用也本必顧乎迹謂之大乘也乘也者聖人之喻道也用也者聖人之起教也夫聖人之道莫至乎心聖人之教莫至乎修調神入道莫至乎一相止觀軌善成德莫至乎一行三昧資一切戒莫至乎無相正一切定莫至乎無念通一切智莫至乎無住生善滅惡莫至乎無相戒篤道推德莫至乎四弘願善觀過莫至乎無相懺正所趣莫至乎三歸戒正大體裁大用莫至乎大般若發大信務大道莫至乎大志天下之窮理盡性莫至乎默傳欲心無過莫善乎不謗定慧為始道之基也一行三昧德之端也無念之宗解脫之謂也無住之本般若之謂也無相之體法身之謂也無相戒戒之最也四弘願願之極也無相懺懺之至也三歸戒真所歸也摩訶智慧聖凡之大範也為上上根人說直說也默傳傳之至也戒謗戒之當也夫妙心者非修所成也非證所明也本成也本明也以迷明者復明所以證也以背成者復成所以修也以非修而修之故曰正修也以非明而明之故曰正證也至人暗然不見其威儀而成德為行藹如也至人頹然若無所持而道顯於天下也蓋以正修而修之也以正證而證之也於此乃曰罔修罔證罔因罔果穿鑿叢脞競為其說繆乎至人之意焉噫放戒定慧而必趨乎混茫之空則吾未如之何也甚乎含識溺心而浮識識與業相乘循諸響而未始息也象之形之人與物偕生紛然乎天地之間可勝數邪得其形於人者固萬萬之一耳人而能覺幾其鮮矣聖人懷此雖以多義發之而天下猶有所不明者也聖人救此雖以多方治之而天下猶有所不醒者也賢者以智亂不肖者以愚壅平平之人以無記惛及其感物而發喜之怒之哀之樂之益蔽者萬端曖然若夜行而不知所至其承於聖人之言則計之博之若蒙霧而望遠謂有也謂無也謂非有也謂非無也謂亦有也謂亦無也以不見而却蔽固終身而不得其審焉海所以在水也魚龍死生在海而不見乎水道所以在心也其人終日說道而不見乎心悲夫心固微妙幽遠難明難湊其如此也矣聖人既隱天下百世雖以書傳而莫得其明驗故壇經之宗舉乃直示其心而天下方知即正乎性命也若排雲霧而頓見太清若登泰山而所視廓如也王氏以方乎世書曰齊一變至於魯魯一變至於道斯言近之矣涅槃曰始從鹿野苑終至跋提河中間五十年未曾說一字者示法非文字也防以文字而求其所謂也曰依法不依人者以法真而人假也曰依義不依語者以義實而語假也曰依智而不依識者以智至而識妄也曰依了義經不依不了義經者以了義經盡理也而菩薩所謂即是宣說大涅槃者謂自說與經同也聖人所謂四人出世即四依也護持正法應當證知者應當證知故至人推本以正其末也自說與經同故至人說經如經也依義依了義經故至人顯說而合義也合經也依法依智故至人密說變之通之而不苟滯也示法非文字故至人之宗尚乎默傳也聖人如春陶陶而發之也至人如秋濯濯而成之也聖人命之而至人效之也至人固聖人之門之奇德殊勳者也夫至人者始起於微自謂不識世俗文字及其成至也方一席之說而顯道救世與乎大聖人之云為者若合符契也固其玄德上智生而知之將自表其法而示其不識乎歿殆四百年法流四海而不息帝王者聖賢者更三十世求其道而益敬非至乎大聖人之所至天且厭之久矣烏能若此也予固豈盡其道幸蚊虻飲海亦預其味敢稽首布之以遺後學者也
